name: Publish

# Packs every packable project and pushes the resulting .nupkg/.snupkg to NuGet.org.
# Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Requires a repository secret `NUGET_API_KEY` (a NuGet.org API key with push rights).
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore TgLLM.NET.sln

      - name: Build
        run: dotnet build TgLLM.NET.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test TgLLM.NET.sln --no-build --configuration Release

      - name: Pack
        run: dotnet pack TgLLM.NET.sln --no-build --configuration Release --output ./artifacts

      - name: Push to NuGet.org
        run: >-
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Upload packages as a build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*
